[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[unix_http_server]
file=/run/supervisor.sock

[supervisorctl]
serverurl=unix:///run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[program:postgres]
command=su-exec postgres postgres -D /var/lib/postgresql/data
priority=10
autostart=true
autorestart=true
stopsignal=INT
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_events_enabled=false
stderr_events_enabled=false

[program:init-db]
command=/usr/local/bin/mono-init-db.sh
directory=/app
priority=20
autostart=true
autorestart=false
startsecs=0
exitcodes=0
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; next + realtime are started by /usr/local/bin/mono-init-db.sh once
; migrations + seed complete. Keeping autostart=false avoids the FATAL
; "database does not exist" race during first-boot DB creation.
[program:next]
command=yarn start --hostname 0.0.0.0 --port 3000
directory=/app
priority=30
autostart=false
autorestart=true
startsecs=5
stopsignal=TERM
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:realtime]
command=yarn realtime:start
directory=/app
priority=30
autostart=false
autorestart=true
startsecs=5
stopsignal=TERM
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
